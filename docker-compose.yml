version: '3.8'

# CRITICAL: All containers must use network_mode: host
# Docker bridge networking causes FreeSWITCH to advertise internal IPs
# in SDP, making RTP unreachable from external callers.

services:
  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: drachtio
    restart: unless-stopped
    network_mode: host
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    command: >
      drachtio
      --contact "sip:127.0.0.1:${DRACHTIO_SIP_PORT:-5060};transport=tcp,udp"
      --address 127.0.0.1
      --external-ip ${DRACHTIO_EXTERNAL_IP}
      --secret ${DRACHTIO_SECRET}
      --port 9022
      --loglevel info
    # Ports (for reference - host mode doesn't need port mapping):
    # - ${DRACHTIO_SIP_PORT:-5060}: SIP UDP/TCP
    # - 9022: Admin/App Port

  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    entrypoint: /usr/local/bin/entrypoint-hermes-freeswitch.sh
    volumes:
      - ./freeswitch/entrypoint.sh:/usr/local/bin/entrypoint-hermes-freeswitch.sh:ro
      - ./freeswitch/mrf.xml:/usr/local/freeswitch/conf/sip_profiles/mrf.xml:ro
    command: >
      freeswitch
      --sip-port 5080
      --password ${FREESWITCH_SECRET}
      --rtp-range-start 30000
      --rtp-range-end 30100
    environment:
      # CRITICAL: Set this to your server's LAN IP
      # This IP goes into SDP packets so 3CX knows where to send audio
      # Note: drachtio-freeswitch-mrf only accepts CLI flags, not env vars
      - EXTERNAL_IP=${EXTERNAL_IP}
    # Ports (for reference):
    # - 8021: ESL (Event Socket Library)
    # - 5080: Internal SIP
    # - 30000-30100: RTP Audio (changed from 20000-20100 to avoid conflict with 3CX SBC)

  voice-app:
    build:
      context: .
      dockerfile: voice-app/Dockerfile
    container_name: voice-app
    restart: unless-stopped
    network_mode: host
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    volumes:
      # Audio files directory for TTS playback
      - ./voice-app/audio:/app/audio
      # Static phone assets, including locally synced hold music
      - ./voice-app/static:/app/static:ro
      # Device configurations
      - ${DEVICE_CONFIG_DIR:-./voice-app/config}:/app/config:ro
    depends_on:
      - drachtio
      - freeswitch
    # Ports (for reference):
    # - 3000: HTTP API
    # - 3001: WebSocket for audio streaming
